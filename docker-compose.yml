version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: polling_db
    environment:
      POSTGRES_USER: ${DB_USER:-poll_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-poll_pass}
      POSTGRES_DB: ${DB_NAME:-polling_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-poll_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: polling_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: